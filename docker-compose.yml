services:
  # PostgreSQL Database
  postgres:
    image: postgres:latest
    container_name: postgres-cookme
    environment:
      POSTGRES_USER: cookme
      POSTGRES_PASSWORD: cookme123
      POSTGRES_DB: cookme_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cookme"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - cookme-network

  # Redis Cache
  redis:
    image: redis:latest
    container_name: redis-cookme
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - redis_data:/data
    networks:
      - cookme-network

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local

networks:
  cookme-network:
    driver: bridge
