<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Consultor SAT - OCR Automático</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh; padding: 20px;
        }
        .container {
            max-width: 800px; margin: 0 auto; background: white;
            border-radius: 15px; box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            overflow: hidden;
        }
        .header {
            background: linear-gradient(135deg, #2196F3, #21CBF3);
            color: white; padding: 30px; text-align: center;
        }
        .header h1 { font-size: 2.5em; margin-bottom: 10px; }
        .content { padding: 30px; }
        .form-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; font-weight: 600; color: #333; }
        input, textarea {
            width: 100%; padding: 12px; border: 2px solid #e1e5e9;
            border-radius: 8px; font-size: 16px; transition: border-color 0.3s;
        }
        input:focus, textarea:focus { outline: none; border-color: #2196F3; }
        textarea { height: 100px; resize: vertical; }
        .captcha-container {
            background: #f8f9fa; padding: 20px; border-radius: 10px;
            text-align: center; margin: 20px 0;
        }
        .captcha-image { 
            max-width: 100%; height: auto; border: 1px solid #ddd;
            border-radius: 5px; margin-bottom: 15px;
        }
        .btn {
            background: linear-gradient(135deg, #2196F3, #21CBF3);
            color: white; border: none; padding: 15px 30px;
            border-radius: 8px; font-size: 16px; font-weight: 600;
            cursor: pointer; transition: transform 0.2s; width: 100%;
            margin: 5px 0;
        }
        .btn:hover { transform: translateY(-2px); }
        .btn:disabled { background: #ccc; cursor: not-allowed; transform: none; }
        .btn-auto { background: linear-gradient(135deg, #4CAF50, #45a049); }
        .result { margin-top: 30px; padding: 20px; border-radius: 10px; display: none; }
        .success { background: #d4edda; border: 1px solid #c3e6cb; color: #155724; }
        .error { background: #f8d7da; border: 1px solid #f5c6cb; color: #721c24; }
        .loading { text-align: center; padding: 20px; display: none; }
        .spinner {
            border: 4px solid #f3f3f3; border-top: 4px solid #2196F3;
            border-radius: 50%; width: 40px; height: 40px;
            animation: spin 1s linear infinite; margin: 0 auto 15px;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); }
        }
        .auto-result { 
            background: #e8f5e8; padding: 10px; border-radius: 5px;
            margin: 10px 0; border-left: 4px solid #4CAF50;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🧾 Consultor SAT - OCR</h1>
            <p>Resolução automática de CAPTCHA com IA</p>
        </div>
        
        <div class="content">
            <div class="form-group">
                <label for="qrcode">📋 Cole o QR Code:</label>
                <textarea 
                    id="qrcode" 
                    placeholder="35251005088303000121590006146504781051248106|20251031103830|83.09||..."
                ></textarea>
            </div>
            
            <button class="btn" onclick="parseQRCode()" id="parseBtn">
                🔍 Extrair Chave
            </button>
            
            <div class="form-group" style="display: none;" id="chaveGroup">
                <label for="chave">🔑 Chave de Acesso:</label>
                <input type="text" id="chave" readonly>
            </div>
            
            <div class="captcha-container" id="captchaContainer" style="display: none;">
                <h3>🔍 Código de Verificação</h3>
                <img id="captchaImage" class="captcha-image" src="" alt="CAPTCHA">
                
                <button class="btn btn-auto" onclick="getCaptchaAuto()" id="autoBtn">
                    🤖 Resolver Automaticamente (OCR)
                </button>
                
                <div id="autoResult" style="display: none;" class="auto-result">
                    <strong>CAPTCHA detectado:</strong> <span id="captchaAutoText"></span>
                </div>
                
                <div class="form-group">
                    <label for="captchaInput">Ou digite manualmente:</label>
                    <input type="text" id="captchaInput" placeholder="ABC123" maxlength="10">
                </div>
                
                <button class="btn" onclick="getNewCaptcha()">
                    🔄 Novo CAPTCHA
                </button>
            </div>
            
            <button class="btn" onclick="consultarSAT()" id="consultarBtn" style="display: none;">
                🚀 Consultar Cupom
            </button>
            
            <div class="loading" id="loading">
                <div class="spinner"></div>
                <p id="loadingText">Processando...</p>
            </div>
            
            <div class="result" id="result"></div>
        </div>
    </div>

    <script>
        let currentFormData = {};
        let currentCookies = {};
        
        async function parseQRCode() {
            const qrcode = document.getElementById('qrcode').value.trim();
            if (!qrcode) {
                alert('Por favor, cole o QR Code');
                return;
            }
            
            document.getElementById('parseBtn').disabled = true;
            
            try {
                const response = await fetch('/parse-qrcode', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ qrcode })
                });
                
                const data = await response.json();
                
                if (data.chave_acesso) {
                    document.getElementById('chave').value = data.chave_acesso;
                    document.getElementById('chaveGroup').style.display = 'block';
                    document.getElementById('parseBtn').style.display = 'none';
                    await getCaptcha();
                } else {
                    alert('Erro: ' + (data.error || 'QR Code inválido'));
                }
                
            } catch (error) {
                alert('Erro: ' + error.message);
            } finally {
                document.getElementById('parseBtn').disabled = false;
            }
        }
        
        async function getCaptcha() {
            showLoading('Carregando CAPTCHA...');
            
            try {
                const response = await fetch('/get-captcha');
                const data = await response.json();
                
                hideLoading();
                
                if (data.success) {
                    document.getElementById('captchaImage').src = data.captcha_image;
                    currentFormData = { viewstate: data.viewstate };
                    currentCookies = data.session_cookies;
                    
                    document.getElementById('captchaContainer').style.display = 'block';
                    document.getElementById('consultarBtn').style.display = 'block';
                    document.getElementById('autoResult').style.display = 'none';
                } else {
                    alert('Erro: ' + data.error);
                }
                
            } catch (error) {
                hideLoading();
                alert('Erro: ' + error.message);
            }
        }
        
        async function getCaptchaAuto() {
            showLoading('Resolvendo CAPTCHA com IA...');
            document.getElementById('autoBtn').disabled = true;
            
            try {
                const response = await fetch('/get-captcha?auto=true');
                const data = await response.json();
                
                hideLoading();
                document.getElementById('autoBtn').disabled = false;
                
                if (data.success) {
                    document.getElementById('captchaImage').src = data.captcha_image;
                    currentFormData = { viewstate: data.viewstate };
                    currentCookies = data.session_cookies;
                    
                    if (data.captcha_auto) {
                        document.getElementById('captchaAutoText').textContent = data.captcha_auto;
                        document.getElementById('captchaInput').value = data.captcha_auto;
                        document.getElementById('autoResult').style.display = 'block';
                    } else {
                        alert('IA não conseguiu resolver o CAPTCHA. Digite manualmente.');
                    }
                } else {
                    alert('Erro: ' + data.error);
                }
                
            } catch (error) {
                hideLoading();
                document.getElementById('autoBtn').disabled = false;
                alert('Erro: ' + error.message);
            }
        }
        
        async function consultarSAT() {
            const chave = document.getElementById('chave').value.trim();
            const captcha = document.getElementById('captchaInput').value.trim();
            
            if (!chave || !captcha) {
                alert('Preencha todos os campos');
                return;
            }
            
            showLoading('Consultando...');
            document.getElementById('consultarBtn').disabled = true;
            
            try {
                const response = await fetch('/consultar', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({
                        chave_acesso: chave,
                        captcha_text: captcha,
                        form_data: currentFormData,
                        cookies: currentCookies
                    })
                });
                
                const data = await response.json();
                showResult(data);
                
            } catch (error) {
                alert('Erro: ' + error.message);
            } finally {
                hideLoading();
                document.getElementById('consultarBtn').disabled = false;
            }
        }
        
        function getNewCaptcha() {
            document.getElementById('captchaInput').value = '';
            document.getElementById('autoResult').style.display = 'none';
            getCaptcha();
        }
        
        function showLoading(text) {
            document.getElementById('loadingText').textContent = text;
            document.getElementById('loading').style.display = 'block';
        }
        
        function hideLoading() {
            document.getElementById('loading').style.display = 'none';
        }
        
        function showResult(data) {
            const result = document.getElementById('result');
            result.style.display = 'block';
            
            if (data.status === 'success') {
                result.className = 'result success';
                result.innerHTML = `
                    <h3>✅ Consulta Realizada!</h3>
                    <p><strong>Chave:</strong> ${data.chave_acesso}</p>
                    ${data.data.numero_cupom ? `<p><strong>Número:</strong> ${data.data.numero_cupom}</p>` : ''}
                    ${data.data.itens ? `
                        <div style="margin-top: 15px;">
                            <h4>🛒 Itens:</h4>
                            ${data.data.itens.map(item => `
                                <div style="background: white; padding: 10px; margin: 5px 0; border-radius: 5px;">
                                    <strong>${item.descricao}</strong><br>
                                    Qtd: ${item.quantidade} | Valor: ${item.valor}
                                </div>
                            `).join('')}
                        </div>
                    ` : ''}
                    <button class="btn" onclick="location.reload()" style="margin-top: 15px;">
                        🔄 Nova Consulta
                    </button>
                `;
            } else {
                result.className = 'result error';
                result.innerHTML = `
                    <h3>❌ Erro</h3>
                    <p>${data.message || data.error}</p>
                    <button class="btn" onclick="getNewCaptcha()" style="margin-top: 15px;">
                        🔄 Tentar Novamente
                    </button>
                `;
            }
        }
        
        // Suporte a Enter
        document.getElementById('qrcode').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') parseQRCode();
        });
        document.getElementById('captchaInput').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') consultarSAT();
        });
    </script>
</body>
</html>
