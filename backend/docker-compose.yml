services:
  postgres:
    # pgvector/pgvector:pg16 — NÃO usar postgres:latest/alpine puro.
    # O RAG de receitas depende da extensão `vector` (ver ADR-0001).
    image: pgvector/pgvector:pg16
    container_name: cookme_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: cookme
      POSTGRES_PASSWORD: cookme123
      POSTGRES_DB: cookme_db
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
      # Cria a extensão `vector` no primeiro boot do volume.
      - ./docker/init-pgvector.sql:/docker-entrypoint-initdb.d/init-pgvector.sql:ro
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U cookme -d cookme_db']
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - cookme_network

  redis:
    image: redis:7-alpine
    container_name: cookme_redis
    restart: unless-stopped
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    networks:
      - cookme_network

  # pgAdmin (opcional - interface gráfica para PostgreSQL)
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: cookme_pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@cookme.com
      PGADMIN_DEFAULT_PASSWORD: admin123
    ports:
      - '5050:80'
    depends_on:
      - postgres
    networks:
      - cookme_network

volumes:
  postgres_data:
  redis_data:

networks:
  cookme_network:
    driver: bridge
