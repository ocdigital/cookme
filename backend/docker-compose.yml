version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: cookme_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: cookme
      POSTGRES_PASSWORD: cookme_new_pass
      POSTGRES_DB: cookme_db
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - cookme_network

  redis:
    image: redis:7-alpine
    container_name: cookme_redis
    restart: unless-stopped
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    networks:
      - cookme_network

  # pgAdmin (opcional - interface gráfica para PostgreSQL)
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: cookme_pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@cookme.com
      PGADMIN_DEFAULT_PASSWORD: admin123
    ports:
      - '5050:80'
    depends_on:
      - postgres
    networks:
      - cookme_network

volumes:
  postgres_data:
  redis_data:

networks:
  cookme_network:
    driver: bridge